<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Technical Knowledge Quiz</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="centered-container">
      <header class="quiz-header">
        <h1>TECHNICAL KNOWLEDGE QUIZ</h1>
      </header>

      <main class="quiz-main">
        <div id="quiz-info" class="info">
          Question <span id="current-index">1</span> of 5
        </div>

        <div id="question-box">
          <h2 id="question-text">Loading question...</h2>
        </div>

        <div id="options-list"></div>
      </main>

      <footer class="quiz-footer">
        <div class="score-display">
          Score: <span id="score-val">0</span> / 5
        </div>
        <button id="next-btn" disabled>Submit Answer</button>
      </footer>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
